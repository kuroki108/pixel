<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Transkript – ticket-0001-kuroki_108</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .wrapper {
      max-width: 860px;
      margin: 0 auto;
    }

    .header {
      background: linear-gradient(135deg, #1c2333 0%, #161b27 100%);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-icon {
      font-size: 2rem;
      line-height: 1;
    }

    h1 {
      color: #7289da;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .meta {
      color: #6e7681;
      font-size: .82rem;
      display: flex;
      gap: 12px;
    }

    .meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg {
      display: grid;
      grid-template-columns: 130px 160px 1fr;
      gap: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      border-left: 3px solid #7289da;
      background: #161b27;
      font-size: .88rem;
      transition: background .15s;
    }

    .msg:hover {
      background: #1c2333;
    }

    .ts {
      color: #484f58;
      white-space: nowrap;
      font-size: .8rem;
      padding-top: 1px;
      font-variant-numeric: tabular-nums;
    }

    .author {
      font-weight: 600;
      color: #a8b3c9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content {
      word-break: break-word;
      color: #c9d1d9;
      line-height: 1.5;
    }

    a { color: #7289da; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-icon">🎫</div>
      <div>
        <h1>Ticket Transkript – #ticket-0001-kuroki_108</h1>
        <div class="meta">
          <span>📅 Erstellt am 07.04.2026 um 09:51 UTC</span>
        </div>
      </div>
    </div>
    <div class="messages">
    </div>
  </div>
</body>
</html>
